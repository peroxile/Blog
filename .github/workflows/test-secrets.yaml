name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "TG_TOKEN length: ${#TG_TOKEN}"
          echo "TG_TOKEN first 10 chars: ${TG_TOKEN:0:10}"
          echo "TG_CHAT_ID value: ${TG_CHAT_ID}"