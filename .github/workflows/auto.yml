name: Rebuild Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:
    
jobs:
  build:
      runs-on: ubuntu-latest
      # Only run on push/dispatch, skip on scheduled runs
      if: github.event_name != 'schedule'

      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - uses:  actions/setup-node@v4
          with:
            node-version: '24'

        - name:   Generate articles manifest
          run: node scripts/build.js

        - name: Commit generated manifest
          run: | 
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add public/data/manifest.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Generate manifest [skip ci]" && git push origin main)

  digest:
    runs-on: ubuntu-latest
    # Only run on the scheduled trigger (and manual dispatch if you want to test)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Make digest script executable
        run: chmod +x digest.sh

      - name: Run Telegram digest
        env: 
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: ./digest.sh
