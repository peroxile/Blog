name: Telegram Digest

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:   # lets you trigger manually to test

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make digest script executable
        run: chmod +x digest.sh

      - name: Run Telegram digest
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: ./digest.sh