<!DOCTYPE html>
<html lang="en">
<head>

    <title>Paul's Website</title>
    <!-- SVG favicon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">

<body>
    <header>
        <div class="logo">Paul's Website</div>

                        <path d="M23.498 6.186a2.998 2.998 0 00-2.11-2.11C19.465 3.5 12 3.5 12 3.5s-7.465 0-9.388.576a2.998 2.998 0 00-2.11 2.11C0 8.11 0 12 0 12s0 3.89.502 5.814a2.998 2.998 0 002.11 2.11C4.535 20.5 12 20.5 12 20.5s7.465 0 9.388-.576a2.998 2.998 0 002.11-2.11C24 15.89 24 12 24 12s0-3.89-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>

                    <svg viewBox="0 0 24 24" aria-hidden="true" role="img">
                        <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4.236-8 5.334-8-5.334V6l8 5.333L20 6v2.236z"/>
                    </svg>

        </div>
    </header>

    <main>
        <div class="intro">
            <h1></h1>
            <p>A collection of notes, guides, documentation and my experiences. I do publish stuffs related to Linux, Open-source and other related content that revolves around it. Hope you'll find it helpful ?</p>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Total Articles</div>
                <div class="stat-value" id="total-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Last Updated</div>
                <div class="stat-value" id="last-updated" style="font-size: 1rem;">--</div>
            </div>
        </div>

        <h2 class="section-title">Articles</h2>

        <!-- Search bar -->
        <div class="search-wrapper">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
            <input
                type="search"
                id="search-input"
                placeholder="Search articles…"
                autocomplete="off"
                spellcheck="false"
            >
        </div>

        <div id="loading" class="loading">Loading articles...</div>
        <div id="error" style="display: none;"></div>
        <div class="articles-container" id="articles-container"></div>
    </main>

    <!-- Back to top -->
    <button id="back-to-top" aria-label="Back to top" title="Back to top">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 15l-6-6-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modal-body" class="markdown-content"></div>
        </div>
    </div>

    <script src="./src/js/app.js"></script>
</body>
</html>
