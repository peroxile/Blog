<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="growing leaf favicon">
  <!-- subtle rounded square background to improve contrast on light pages (optional) -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#ffffff00"/>
  <!-- leaf shape -->
  <path d="M6.8 20.5c2.3-5.6 7.6-10.2 13-11.9 0 0-5.8 3.1-8.4 6.8-2.5 3.6-3.1 6.6-4.6 8.8-0.6 0.9-1.8 0.7-2.1-0.3-0.2-0.6 0.0-1.2 0.1-1.8z"
        fill="#2d9a2f"/>
  <!-- highlight/lighter inner area to suggest growth/shine -->
  <path d="M9.2 12.8c3.0-1.0 6.3-0.8 9.0 0.6-2.6 2.9-5.2 5.9-7.6 9.1-1.4-3.1-2.5-6.4-1.4-9.7z"
        fill="#66c24a" opacity="0.95"/>
  <!-- central vein -->
  <path d="M14.8 11.6c1.6 2.4 3.8 5.0 5.6 7.8" stroke="#1f7a18" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- small stem -->
  <path d="M8.4 21.8c1.2-0.6 3.0-1.6 5.6-3.0" stroke="#166013" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>